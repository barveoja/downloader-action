    <style>
      :root {
        --bg: #0b1120;
        --white: #ffffff;
        --text-dark: #97a5bc;
        --text-secondary: #afbbcf;
        --border: #161d2f;
        --brand-10: rgba(70, 123, 255, 0.1);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background-color: var(--bg);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-feature-settings:
          "liga" 0,
          "lnum",
          "tnum";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      .page {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 46px 16px 96px;
        overflow: hidden;
      }

      /* Background glow - mobile */
      .bg-glow {
        position: absolute;
        pointer-events: none;
        width: 1920px;
        height: 750px;
        top: 191px;
        left: calc(100% - 187px);
        transform: translateX(-50%);
        opacity: 0.1;
        background: radial-gradient(
          ellipse at center,
          rgba(70, 123, 255, 0.6) 0%,
          rgba(70, 123, 255, 0.15) 35%,
          transparent 65%
        );
        mix-blend-mode: hard-light;
        animation: glow-pulse 6s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% { opacity: 0.1; transform: translateX(-50%) scale(1); }
        50% { opacity: 0.18; transform: translateX(-50%) scale(1.05); }
      }

      .top-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px;
        width: 100%;
      }

      .logo svg {
        display: block;
        width: 221px;
        height: 32px;
      }

      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        width: 100%;
      }

      .icon-box {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px;
        background: var(--brand-10);
        border-radius: 16px;
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      .icon-box svg {
        display: block;
        width: 42px;
        height: 42px;
        animation: wrench-wiggle 4s ease-in-out infinite;
      }

      @keyframes wrench-wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(8deg); }
        75% { transform: rotate(-8deg); }
      }

      .text-content {
        display: flex;
        flex-direction: column;
        gap: 24px;
        text-align: center;
        width: 100%;
      }

      h1 {
        color: var(--white);
        font-size: 32px;
        font-weight: 600;
        line-height: 40px;
        letter-spacing: 0;
      }

      .description {
        color: var(--text-dark);
        font-size: 16px;
        font-weight: 400;
        line-height: 20px;
        letter-spacing: 0;
      }

      .info {
        display: flex;
        flex-direction: column;
        gap: 32px;
        align-items: flex-start;
        width: 335px;
        max-width: 100%;
      }

      .downtime-pill {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 100px;
        background: var(--bg);
        width: 100%;
      }

      .downtime-pill > svg {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
      }

      .downtime-text {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 16px;
        font-weight: 400;
        line-height: 20px;
        text-align: center;
        white-space: nowrap;
      }

      .label {
        color: var(--text-secondary);
      }

      .value {
        color: var(--white);
      }

      .support-row {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        font-size: 16px;
        font-weight: 400;
        line-height: 20px;
        white-space: nowrap;
      }

      .support-row > svg {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
      }

      /* Desktop layout */
      @media (min-width: 1024px) {
        .page {
          justify-content: center;
          gap: 120px;
          padding: 0 40px;
        }

        .bg-glow {
          width: 884px;
          height: 866px;
          left: 960px;
          top: 479px;
          transform: translate(-50%, -50%);
          opacity: 1;
          background: radial-gradient(
            ellipse at center,
            rgba(70, 123, 255, 0.15) 0%,
            rgba(70, 123, 255, 0.05) 40%,
            transparent 70%
          );
          mix-blend-mode: normal;
          animation-name: glow-pulse-desktop;
        }

        @keyframes glow-pulse-desktop {
          0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
          50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.08); }
        }

        .top-group {
          display: contents;
        }

        .logo svg {
          width: 276.63px;
          height: 40px;
        }

        .content {
          width: 535px;
        }

        .text-content {
          gap: 32px;
        }

        h1 {
          font-size: 56px;
          line-height: 67px;
        }

        .description {
          font-size: 24px;
          line-height: 32px;
        }
      }
    </style>

      (function () {
        var raw = (
          navigator.language ||
          navigator.languages[0] ||
          "en"
        ).toLowerCase();
        var lang;

        if (raw.startsWith("zh")) {
          lang = raw.includes("tw") || raw.includes("hant") ? "tw" : "cn";
        } else {
          lang = raw.split("-")[0];
        }

        if (!translations[lang]) lang = "en";

        var t = translations[lang];
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });

        document.documentElement.lang =
          lang === "cn" ? "zh-CN" : lang === "tw" ? "zh-TW" : lang;

        if (lang === "ar") {
          document.documentElement.dir = "rtl";
        }
      })();
